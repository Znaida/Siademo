name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/azure-static-web-apps-ashy-desert-090fd4a0f.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build-check:
    name: Validar build Angular
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: |
          cd frontend
          npm ci

      - name: Compilar Angular (production)
        run: |
          cd frontend
          npm run build -- --configuration production

  build_and_deploy_job:
    name: Deploy a Azure Static Web Apps
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    needs: build-check
    runs-on: ubuntu-latest
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
           script: |
               const coredemo = require('@actions/core')
               return await coredemo.getIDToken()
           result-encoding: string
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_DESERT_090FD4A0F }}
          action: "upload"
          app_location: "./frontend"
          api_location: ""
          output_location: "dist/frontend/browser"
          github_id_token: ${{ steps.idtoken.outputs.result }}

  smoke_tests:
    name: Smoke Tests en Azure
    if: github.event_name == 'push'
    needs: build_and_deploy_job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: |
          cd frontend
          npm ci

      - name: Instalar Playwright Chromium
        run: |
          cd frontend
          npx playwright install chromium --with-deps

      - name: Esperar que Azure esté listo
        run: sleep 30

      - name: Correr smoke tests contra Azure
        run: |
          cd frontend
          npx playwright test e2e/tests/smoke.spec.ts
        env:
          BASE_URL: https://ashy-desert-090fd4a0f.5.azurestaticapps.net

      - name: Subir reporte si fallan
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: frontend/e2e/report/
          retention-days: 7

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
