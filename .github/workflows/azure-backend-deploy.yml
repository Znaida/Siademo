name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/azure-backend-deploy.yml'

jobs:
  test:
    name: Tests y cobertura
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Correr pytest con cobertura
        run: |
          cd backend
          python -m pytest
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci_test_secret_key_siade_2026' }}

  deploy:
    name: Deploy a Azure App Service
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'kronosdemos-fbeyekffbfe9fre7'
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: './backend'
